<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Vbi Component</title>

    <script type="module" src="/build/vbi-component.esm.js"></script>
    <script nomodule src="/build/vbi-component.js"></script>
    <style>
      body {
        margin: 30px;
        display: grid;
        grid-auto-flow: row;
        gap: 30px;
      }
    </style>
  </head>

  <body>
    <vbi-config-provider>
      <vbi-chart-editor></vbi-chart-editor>
      <vbi-menu id="my-menu" variant="horizontal"></vbi-menu>
    </vbi-config-provider>
  </body>

  <script>
    const menuElement = document.getElementById('my-menu')

    // Dữ liệu mock đúng theo Interface MenuItem
    menuElement.items = [
      { label: 'DANH MỤC', isTitle: true, url: '.' },
      { label: 'Trang chủ', isActive: true, url: '.' },
      {
        label: 'Sản phẩm',
        badge: 'Mới',
        children: [
          { label: 'Điện thoại', badge: 'sss' },
          { label: 'Laptop', url: '.', disabled: true },
          { label: 'Phụ kiện' },
        ],
      },
      { label: 'Cài đặt hệ thống' },
    ]
  </script>
</html>
